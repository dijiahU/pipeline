### model
model_name_or_path: Qwen/Qwen2.5-0.5B-Instruct
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 8
lora_alpha: 16
lora_target: all
lora_dropout: 0.05

### dataset
dataset: askbench_sft
dataset_dir: .
template: qwen
cutoff_len: 2048
preprocessing_num_workers: 4
dataloader_num_workers: 0

### output
output_dir: ../results/lora_adapter
logging_steps: 5
save_steps: 50
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: none

### train — Mac MPS (24GB unified memory)
# Qwen2.5-0.5B-Instruct is ~1GB, very comfortable on Mac
# MPS does NOT support bf16/fp16 mixed precision reliably
per_device_train_batch_size: 2
gradient_accumulation_steps: 4
learning_rate: 1.0e-4
num_train_epochs: 5.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: false
fp16: false
ddp_timeout: 180000000

### eval (uncomment to enable validation)
# val_size: 0.1
# per_device_eval_batch_size: 2
# eval_strategy: steps
# eval_steps: 50
