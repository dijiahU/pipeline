### model
# Official verified Hugging Face repo id for Qwen3.5 9B.
# Replace with a local shared-storage path later if your compute nodes cannot access HF.
model_name_or_path: /home/hcj/pipeline/models/Qwen3.5-9B
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 32
lora_alpha: 64
lora_target: all
lora_dropout: 0.05

### quantization
quantization_bit: 4
quantization_method: bitsandbytes
double_quantization: true

### dataset
dataset: askbench_sft
dataset_dir: .
template: qwen3_5
cutoff_len: 6144
overwrite_cache: true
packing: false
preprocessing_num_workers: 16
dataloader_num_workers: 4

### output
output_dir: ../results/qwen35_9b_lora_adapter
logging_steps: 5
save_steps: 50
save_total_limit: 3
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: none

### train — default profile for 24 GB to 48 GB GPUs
per_device_train_batch_size: 1
gradient_accumulation_steps: 16
learning_rate: 1.5e-4
num_train_epochs: 5.0
lr_scheduler_type: cosine
warmup_ratio: 0.05
optim: paged_adamw_32bit
gradient_checkpointing: true
bf16: true
ddp_timeout: 180000000

