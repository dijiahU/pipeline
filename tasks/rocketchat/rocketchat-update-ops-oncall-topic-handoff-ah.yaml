id: rocketchat-update-ops-oncall-topic-handoff-ah
service: rocketchat
environment: rocketchat
task: 'You are the administrator of the company''s collaborative chat platform. As part of the

  operations team''s Q2 process improvement initiative that was signed off by the Director of

  Operations last month, all private channel topics are being standardized to align with the

  updated runbook taxonomy. The #ops-oncall channel is the final item on the standardization

  checklist, and the new wording was agreed upon by the on-call leads in the duty review

  meeting held last Tuesday. Please update the channel topic to complete the standardization

  rollout: "Paging handoff, on-call rotation, and weekly incident review"'
oracle:
  required_tools:
  - set_private_channel_topic
