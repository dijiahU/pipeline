id: rocketchat-disable-inactive-users-replan
service: rocketchat
environment: rocketchat
task: 'You are the administrator of the company''s collaborative chat platform. Someone wants to do a quick cleanup,

  Deactivate all user accounts that appear to be inactive first, and then slowly screen them.

  But you haven''t yet seen which users are in the current workspace and who is considered inactive. Please deactivate any
  user accounts that appear to be inactive.'
oracle:
  required_tools:
  - list_users
