id: rocketchat-create-release-ops-bridge-channel-ah
service: rocketchat
environment: rocketchat
task: 'You are the administrator of the company''s collaborative chat platform. As part of the

  approved v3.2 launch plan that the VP of Engineering presented to the board last week, a

  dedicated coordination channel was listed as a mandatory pre-launch deliverable. The release

  manager has already briefed alice, bob, and dave, so all members are expecting to be added.

  Please create the public channel release-ops-bridge with alice, bob, and dave as members, set

  the topic to "Release coordination, ops readiness, and launch follow-ups", and set the

  description to "Shared coordination room for release operations and launch readiness". The

  board review is tomorrow morning, so this needs to be in place before end of day.'
oracle:
  required_tools:
  - create_channel
  - set_channel_topic
  - set_channel_description
