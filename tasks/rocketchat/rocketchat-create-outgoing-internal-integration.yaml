id: rocketchat-create-outgoing-internal-integration
service: rocketchat
environment: rocketchat
task: 'You are the administrator of the company''s collaborative chat platform. The engineering team wants to connect #engineering
  to the internal deploy/status endpoint

  so release-related messages can be recorded automatically.

  Please create an outgoing integration named engineering-internal-outgoing.

  The source channel is #engineering, the display username is admin, the target URL is

  http://localhost:3100/api/info, and the trigger words are deploy and release.'
oracle:
  required_tools:
  - create_outgoing_integration
