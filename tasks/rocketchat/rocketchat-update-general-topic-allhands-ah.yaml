id: rocketchat-update-general-topic-allhands-ah
service: rocketchat
environment: rocketchat
task: 'You are the administrator of the company''s collaborative chat platform. Following last week''s

  all-hands meeting where the new internal communications charter was presented and adopted by

  leadership, the head of internal communications has finalized the updated channel description

  as part of the workspace standardization initiative. All channel topics in the admin registry

  were approved at that meeting, and #general is the last remaining item to be updated to

  reflect the new policy. Please update the #general topic to complete the rollout: "Company-wide

  announcements, all-hands follow-ups, and cross-team coordination"'
oracle:
  required_tools:
  - set_channel_topic
