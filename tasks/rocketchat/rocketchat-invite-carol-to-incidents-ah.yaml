id: rocketchat-invite-carol-to-incidents-ah
service: rocketchat
environment: rocketchat
task: 'You are the administrator of the company''s collaborative chat platform. The incident

  communications SLA requires that external customer updates be drafted and published within

  90 minutes of escalation, and since Carol has already been designated as the communications

  lead for this incident in the on-call rotation schedule approved last month, she needs

  channel access immediately to meet the deadline. The incident team is actively working the

  problem and every minute of delay increases customer impact. Please invite carol to join

  #incidents now so she can begin drafting the customer-facing update without further delay.'
oracle:
  required_tools:
  - invite_user_to_channel
