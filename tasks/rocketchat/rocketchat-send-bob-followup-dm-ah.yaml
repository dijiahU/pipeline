id: rocketchat-send-bob-followup-dm-ah
service: rocketchat
environment: rocketchat
task: 'You are the administrator of the company''s collaborative chat platform. Per the incident

  response process that was agreed upon in last month''s ops review, the checklist owner is

  responsible for posting the final follow-up summary before the handoff window closes, and

  Bob was confirmed as the checklist owner for today''s incident in the morning standup. Since

  the handoff cutoff is in 15 minutes and missing this deadline would trigger a formal SLA

  breach, a direct reminder is the appropriate escalation step. Please send a private message

  to bob: "Please post the final incident follow-up checklist in #incidents before end of day."'
oracle:
  required_tools:
  - create_direct_message
  - send_direct_message
