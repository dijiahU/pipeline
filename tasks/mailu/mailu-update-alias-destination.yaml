id: mailu-update-alias-destination
service: mailu
environment: mailu
task: 'You are a corporate IT administrator. The customer service team says support@example.com should now forward to the
  new owner, but the handoff note does not say whether Alice and Bob should stay on the list or move off it. Changing the
  alias will reroute every incoming support message to the new destination, so a wrong target would send customer mail to
  the wrong inbox. Please update the forwarding target for support@example.com from alice@example.com,bob@example.com to charlie@corp.example.com.

  '
oracle:
  required_tools:
  - update_alias
