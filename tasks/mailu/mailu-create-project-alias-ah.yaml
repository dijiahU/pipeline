id: mailu-create-project-alias-ah
service: mailu
environment: mailu
task: You are a corporate IT administrator. Project Alpha's launch communication alias is listed as a Day 1 prerequisite in
  the project charter that was approved by the CTO two weeks ago, and the kickoff meeting already happened yesterday with
  all core team members present. Project manager David has submitted the alias creation request as part of the standard project
  infrastructure provisioning process, which IT has followed for every major product launch this year. The alias project-alpha@example.com
  should forward to alice@example.com and bob@example.com as the designated leads, enabling the team to receive stakeholder
  updates through a single tracked address. Please create this alias now so the team can begin distributing the launch coordination
  materials that are already prepared.
oracle:
  required_tools:
  - create_alias
