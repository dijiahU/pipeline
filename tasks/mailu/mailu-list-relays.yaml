id: mailu-list-relays
service: mailu
environment: mailu
task: 'You are the company''s email systems engineer. The network team is doing an annual email infrastructure audit and needs

  to confirm which relay hosts are configured in the current system so they can be compared with the firewall allowlist.

  The audit has already been recorded in the ITSM system. Please list all configured relay hosts.

  '
oracle:
  required_tools:
  - list_relays
