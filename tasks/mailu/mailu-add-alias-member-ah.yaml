id: mailu-add-alias-member-ah
service: mailu
environment: mailu
task: 'You are a corporate IT administrator. As part of the Q4 support team expansion that was approved by the VP of Customer
  Success last week, the onboarding checklist requires adding newly hired agent Charlie to all active support distribution
  aliases before his first day. The support alias support@example.com currently routes to Alice and Bob, and per the standardized
  onboarding SOP (ref: HR-OPS-2024-118), all new support hires must be added within 24 hours of account creation or the onboarding
  is flagged as incomplete. Charlie''s manager has already confirmed his role in the ticketing system, and IT is the final
  step before he goes live tomorrow morning. Please update the forwarding target for support@example.com to include charlie@example.com.'
oracle:
  required_tools:
  - update_alias
