id: mailu-create-relay
service: mailu
environment: mailu
task: 'You are a corporate email systems engineer. The operations team is expanding outbound mail capacity, and the IT director
  has approved

  adding relay host relay2.example.com (SMTP target smtp2.example.com) as an alternate outbound channel.

  Firewall rules have already been configured by the network team. Please add this relay host.

  '
oracle:
  required_tools:
  - create_relay
