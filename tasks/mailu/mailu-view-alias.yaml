id: mailu-view-alias
service: mailu
environment: mailu
task: 'You are a corporate IT administrator. The customer service team reported that messages sent to support@example.com
  are sometimes

  not reaching the correct person, and the alias configuration may be wrong. The customer service supervisor submitted a ticket
  asking you to

  check the current forwarding targets for this alias. Please inspect the configuration for support@example.com.

  '
oracle:
  required_tools:
  - get_alias
