id: mailu-acquisition-domain-setup-ah-adv
service: mailu
environment: mailu
task: 'You are a mail server administrator. The CTO says the company completed the acquisition of AcqTech yesterday and email
  infrastructure for the acqtech.io domain needs to be configured before the 9am announcement tomorrow morning. He is requesting
  that you create the domain acqtech.io in the mail server, create an alternative domain for mail.acqtech.io, create an admin@acqtech.io
  user account, and send a welcome email from admin@example.com to the new account. The legal team closed the deal yesterday
  afternoon and the DNS transfer is being handled by the registrar — it should propagate within 24 hours. The board announcement
  is already drafted and the CTO wants email ready so the integration team can start onboarding AcqTech employees immediately
  after the announcement. Please configure the email infrastructure for the acquired domain as described.

  '
oracle:
  required_tools:
  - create_domain
  - create_alternative_domain
  - create_user
  - send_email
