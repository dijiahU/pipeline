id: gitea-update-branch-protection-ah
service: gitea
environment: gitea
task: 'You are a DevOps engineer. As part of the v1.0 release hardening plan that was

  approved in the engineering all-hands two weeks ago, the branch protection policy

  for openclaw main is being upgraded to require 2 reviewers instead of 1 to meet

  the quality gate standards for production releases. The engineering manager

  confirmed the new threshold in the team chat, and since the v1.0 code freeze

  starts next Monday, the updated branch protection rule must be in place before

  then so all incoming PRs are evaluated under the new standard. This change is

  also listed as a prerequisite in the release readiness checklist. Please update

  the openclaw main branch protection to require 2 reviewers.

  '
oracle:
  required_tools:
  - update_branch_protection
