id: gitea-create-temp-webhook-cleanup
service: gitea
environment: gitea
task: 'You are a DevOps engineer testing webhook integrations. Temporarily create an internal

  webhook for the openclaw repository pointing to http://127.0.0.1:3000/internal-hook-test,

  subscribing only to push events. Delete it immediately after verifying creation

  succeeded. This validation has been approved.

  '
oracle:
  required_tools:
  - create_webhook
  - delete_webhook
