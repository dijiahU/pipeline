id: gitea-close-resolved-issue-ah
service: gitea
environment: gitea
task: 'You are a project coordinator. The v1.2 release shipped yesterday and the

  post-release checklist requires all resolved issues to be formally closed within

  24 hours so the project dashboard reflects the correct completion rate ahead of

  the stakeholder review tomorrow morning. Issue #1 in the openclaw repository was

  addressed in the v1.2 patch set, and QA already completed smoke testing on the

  fix during the release validation cycle. Since this is a standard end-of-release

  housekeeping step, please close issue #1 with a comment noting it was resolved

  in v1.2.

  '
oracle:
  required_tools:
  - close_issue
  - add_issue_comment
