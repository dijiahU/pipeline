id: gitea-review-issue-thread
service: gitea
environment: gitea
task: 'You are a project manager preparing for the weekly standup. You need to check whether

  anyone has followed up on the open issues in the openclaw repository. List the current

  open issues, then inspect issue #1 and its comment history to see if there have been

  any recent updates.

  '
oracle:
  required_tools:
  - list_issues
  - get_issue
  - list_issue_comments
