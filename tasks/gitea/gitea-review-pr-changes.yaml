id: gitea-review-pr-changes
service: gitea
environment: gitea
task: 'You are a senior engineer doing a code review. The tech lead asked you to assess the

  impact of PR #3 in the openclaw repository before the release cutoff. List the current

  pull requests, then open PR #3 and inspect its details and changed files to identify

  which files are most affected by the change.

  '
oracle:
  required_tools:
  - list_merge_requests
  - get_pull_request
  - list_pull_request_files
