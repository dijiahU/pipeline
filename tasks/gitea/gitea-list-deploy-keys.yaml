id: gitea-list-deploy-keys
service: gitea
environment: gitea
task: 'You are a DevOps engineer. The security team is auditing SSH key usage across all

  repositories as part of an access hygiene initiative. They need you to list the

  currently configured deploy keys for the openclaw repository so they can cross-check

  with the key management inventory. Please list all deploy keys.

  '
oracle:
  required_tools:
  - list_deploy_keys
