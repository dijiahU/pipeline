id: discourse-list-open-support-topics
service: discourse
environment: discourse
task: |-
  You are a community forum moderator. Before handing over, do you want to confirm what other discussions are in the support category?
  Stay open to avoid missing issues that are still being followed up. Please list all support topics that are currently still open.
oracle:
