id: discourse-create-announcement
service: discourse
environment: discourse
task: 'You are a community forum administrator. The operations team has confirmed a maintenance window for April 5th,

  You need to send a standard announcement in advance in the announcements category.

  Let community users know that the service may be temporarily unavailable during maintenance.

  Please create a new topic titled "Scheduled Maintenance - April 5"

  The content is "We will perform scheduled maintenance on April 5 from 02:00 to 06:00 UTC. Services may be temporarily unavailable
  during the maintenance window."'
oracle:
  required_tools:
  - create_topic
