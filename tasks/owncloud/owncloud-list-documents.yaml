id: owncloud-list-documents
service: owncloud
environment: owncloud
task: 'You are the company document platform administrator. The new operations coordinator is getting familiar with the shared
  disk structure.

  They want to confirm that the main subfolders under Documents are present, especially README, Meeting-Notes, and Reports.

  Please review the Documents directory in ownCloud read-only and confirm that those entries are present.'
oracle:
  required_tools:
  - list_files
