id: owncloud-read-salary-file
service: owncloud
environment: owncloud
task: 'You are the company document platform administrator. HR business partners are checking whether the 2026 salary bands

  have been copied to the shared drive, and they especially want to confirm that the Staff Engineer level is still present
  in the latest table.

  This is a read-only verification and no files need to be modified. Please read

  the contents of HR-Confidential/Salary/salary-bands-2026.csv.'
oracle:
  required_tools:
  - read_file
