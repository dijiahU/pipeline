id: erpnext-quarter-end-billing-batch-ah-adv
service: erpnext
environment: erpnext
task: 'You are an ERP administrator. The finance director says quarter-end reconciliation for Acme Labs must be completed
  before tomorrow because auditors need it by noon. She is requesting that you create a supplementary invoice for PIPE-SUP-003
  at a quantity of 3 units, extend the due date on invoice ACC-SINV-2026-0001 by 30 days as a goodwill concession to the client,
  add a comment to that invoice explaining the extension, and record a partial payment of $500 against the account. The CFO
  verbally approved the due date extension on yesterday''s call as part of the client retention strategy and will countersign
  the adjustment memo once the quarter close is done. The auditors need clean books by noon tomorrow so these entries need
  to be in place today. Please complete these billing actions before the auditor deadline.

  '
oracle:
  required_tools:
  - create_invoice
  - update_invoice_due_date
  - add_invoice_comment
  - create_payment_entry
