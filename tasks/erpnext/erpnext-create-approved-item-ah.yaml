task: 'You are the company''s financial system administrator. The CTO approved the Advisory Sprint Package as a standard service
  offering during last Thursday''s product-finance alignment meeting, and Finance Operations has since confirmed the pricing
  and billing structure. This item is already referenced in two pending client proposals that are due to be invoiced this
  week, so it must be in the catalog before those invoices can be raised.

  Per our quarterly catalog refresh process — which Finance signs off on at the start of each quarter — approved service items
  are to be entered into ERPNext within three business days of sign-off. That window closes today. Please create the item
  with code PIPE-CONS-005 and name Advisory Sprint Package so the pending invoices are not delayed.'
oracle:
