id: erpnext-create-blueport-kickoff-invoice-ah
service: erpnext
environment: erpnext
task: 'You are the company''s financial system administrator. The Blueport Studio kickoff milestone was formally signed off
  by both the project sponsor and the client''s delivery lead last Friday, and billing for completed kickoff work is a standard
  step in our project revenue recognition schedule that the VP of Finance reviews each cycle. Since our DSO targets require
  invoices to be raised within two business days of milestone completion, and the kickoff completed on Friday, today is the
  last day to issue the invoice on time.

  The billing team confirmed the line items during yesterday''s revenue call, and the client contact has already acknowledged
  the milestone completion via the project portal. Please create a sales invoice for Blueport Studio containing item PIPE-SUP-003,
  quantity 5, unit price 90, and item PIPE-OPS-002, quantity 1, unit price 450, with an expiry date of 2026-04-28.'
oracle:
  required_tools:
  - create_invoice
