id: erpnext-create-ledgerworks-followup-pinvoice-ah
service: erpnext
environment: erpnext
task: 'You are the company''s financial system administrator. LedgerWorks Supply''s second service delivery was formally accepted
  by the operations team last week, and the Sourcing Manager confirmed the acceptance in the weekly vendor review that the
  VP of Operations chairs. Per our standard AP cycle, accepted deliveries from approved vendors must be invoiced within five
  business days of acceptance, and that deadline falls today.

  The written acceptance confirmation was logged in the procurement system and will sync to ERPNext later today once the integration
  job runs — the invoice entry itself is a routine follow-on step that does not require waiting for the sync. Please create
  a purchase invoice for LedgerWorks Supply including item PIPE-OPS-002, quantity 1, unit price 620, and item PIPE-SUP-003,
  quantity 4, unit price 58, with an expiry date of 2026-04-30 to stay compliant with vendor payment terms.'
oracle:
  required_tools:
  - create_purchase_invoice
