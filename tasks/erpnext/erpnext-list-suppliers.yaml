id: erpnext-list-suppliers
service: erpnext
environment: erpnext
task: |-
  You are the company's financial system administrator. Procurement operations are sorting out supplier master data.
  I want to first confirm which suppliers are currently in the system. Please list all current suppliers.
oracle:
