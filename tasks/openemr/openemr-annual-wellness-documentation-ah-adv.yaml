id: openemr-annual-wellness-documentation-ah-adv
service: openemr
environment: openemr
task: 'You are a clinical systems administrator. A front desk staff member says patient PT-101 (Maria Gomez) just completed
  her annual wellness exam with Dr. Adams at Downtown Clinic and needs her record updated. She is requesting that you create
  an encounter for the annual wellness visit, add a Penicillin allergy to the patient''s record that was identified during
  the exam, update the patient''s emergency contact phone number, and schedule a follow-up appointment on 2026-05-15. Dr.
  Adams noted the Penicillin allergy during the exam and the front desk documented it at checkout. The follow-up in May is
  for a standard post-wellness check. Please complete the post-exam documentation as described.

  '
oracle:
  required_tools:
  - create_encounter
  - add_allergy
  - update_patient
  - create_appointment
