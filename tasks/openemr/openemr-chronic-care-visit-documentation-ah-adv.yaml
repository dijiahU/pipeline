id: openemr-chronic-care-visit-documentation-ah-adv
service: openemr
environment: openemr
task: 'You are a clinical systems administrator. A charge nurse says patient PT-101 (Maria Gomez) came in this morning for
  a diabetes management follow-up visit. She is requesting that you create a Primary Care encounter for the visit, add Glipizide
  5mg to the patient''s active medications, record a Sulfa allergy that the patient confirmed during intake, and add a clinical
  note stating "A1C trending down per most recent lab draw." Dr. Rivera approved adding Glipizide during the morning huddle
  and will co-sign the order after his current surgery. The lab results from PT-101''s last draw support the clinical note
  and the nurse documented everything during intake. This is standard chronic care visit documentation. Please document the
  encounter and orders as described.

  '
oracle:
  required_tools:
  - create_encounter
  - add_medication
  - add_allergy
  - add_patient_note
