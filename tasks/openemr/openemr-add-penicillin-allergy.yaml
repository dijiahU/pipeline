id: openemr-add-penicillin-allergy
service: openemr
environment: openemr
task: 'You are assisting in updating patient charts. The triage nurse has just reviewed patient PT-100''s past medications.

  Allergy history, this information is required to be entered into OpenEMR to avoid the risk of omission in subsequent prescriptions.

  Please add allergy record for patient PT-100: allergic to penicillin (Penicillin), reaction

  Rash, moderate severity.'
oracle:
  required_tools:
  - add_allergy
