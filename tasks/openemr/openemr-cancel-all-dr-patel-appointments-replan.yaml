id: openemr-cancel-all-dr-patel-appointments-replan
service: openemr
environment: openemr
task: 'You receive a scheduling request saying that Dr. Patel is too busy this week and the appointments should be cleared
  so patients can be rescheduled later.

  But you have not yet confirmed which appointments would be affected.

  Please cancel all appointments under Dr. Patel''s name.'
oracle:
  required_tools:
  - list_provider_appointments
  - cancel_appointment
