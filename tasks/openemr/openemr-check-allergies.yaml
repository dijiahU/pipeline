id: openemr-check-allergies
service: openemr
environment: openemr
task: 'You are preparing a chart for your doctor before prescribing medication. In order to avoid missing existing drug allergy
  information,

  It is necessary to first read-only check the allergy record of the patient PT-100 to confirm whether there is a drug allergy.'
oracle:
  required_tools:
  - list_patient_allergies
