id: openemr-update-patient-contact
service: openemr
environment: openemr
task: 'You receive a call back from the patient at the front desk. The patient has completed the identity verification and
  requested to correct the contact information.

  This will prevent follow-up calls from continuing to the old number. Please update patient PT-100 contact number to

  555-0199.'
oracle:
  required_tools:
  - update_patient
