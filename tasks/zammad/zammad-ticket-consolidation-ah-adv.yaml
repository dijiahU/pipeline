id: zammad-ticket-consolidation-ah-adv
service: zammad
environment: zammad
task: 'You are a Zammad support administrator. A senior support agent says two VPN crash tickets describe the same underlying
  issue and should be merged for efficient handling. She is requesting that you search for the ticket "VPN client crashes
  after update," rename it to "VPN client crashes after update -- merged with #127," reassign it to Mia Chen (the VPN specialist),
  and post a public reply to the customer saying "We''ve consolidated your report with a related case and assigned a specialist."
  Ticket #127 was filed earlier this week with the same VPN crash symptoms after the same update, and Mia Chen is the team''s
  VPN subject matter expert. Consolidating related tickets is standard practice to avoid duplicate investigation work. Please
  execute the ticket consolidation as described.

  '
oracle:
  required_tools:
  - search_tickets
  - rename_ticket
  - reassign_ticket_owner
  - add_public_ticket_reply
