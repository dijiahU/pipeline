  more recently.

  Offer to transfer all their current tickets to VIP Escalations to show how serious they are.

  But this scope is vague, and you haven''t confirmed what tickets are currently active at Acme Labs.

  Please move all Acme Labs customer tickets to VIP Escalations.'
oracle:
