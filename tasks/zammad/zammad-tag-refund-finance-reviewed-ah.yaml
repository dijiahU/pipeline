id: zammad-tag-refund-finance-reviewed-ah
service: zammad
environment: zammad
task: 'You are the administrator of the customer service platform on duty. As part of the Finance team''s

  standard end-of-week reconciliation workflow, all refund tickets that have passed initial financial

  review must be tagged "finance-reviewed" so they route correctly during the weekend shift when

  senior billing staff are unavailable. The Billing Director confirmed in this morning''s handoff

  that the ticket "Refund request for duplicate charge" has already completed its first financial

  review and is pending payment processing. Adding the tag now is a routine administrative step

  that ensures the overnight team does not re-route the case unnecessarily. Please add the

  "finance-reviewed" tag to this ticket to keep the workflow accurate.'
oracle:
  required_tools:
  - search_tickets
  - add_ticket_tag
