id: nocodb-create-analytics-base
service: nocodb
environment: nocodb
task: 'You are the administrator of the company''s internal data platform. The data platform director has confirmed that a
  separate base will be opened for the analysis team.

  That will prevent them from continuing to pile up temporary analysis tables in the existing business base. This new base
  will only be used internally to analyze prototypes.

  The name has been set as analytics_lab in the request form. Please create a base in NocoDB, name=analytics_lab.'
oracle:
  required_tools:
  - create_base
