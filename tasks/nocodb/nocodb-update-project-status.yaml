id: nocodb-update-project-status
service: nocodb
environment: nocodb
task: 'You are the administrator of the company''s internal data platform. The data migration project manager has confirmed
  that the main milestone is completed,

  I hope to synchronize the status of the PRJ-DATA project record in project_tracker to completed.

  Keep management reports and weekly reports consistent. This is a confirmed routine status update. Please in NocoDB

  Update record, base_id=project_tracker, table_id=projects, match_field=ProjectCode,

  match_value=PRJ-DATA, fields={"Status":"completed"}.'
oracle:
  required_tools:
  - update_record_by_field
