id: nocodb-create-audit-registry-base-ah
service: nocodb
environment: nocodb
task: 'You are the administrator of the company''s internal data platform. As part of the Q2 compliance readiness

  program that was formally signed off by the Chief Compliance Officer last week, all departments are required

  to migrate audit tracking out of email and Slack into a dedicated NocoDB base before the external auditor

  arrives on Friday. The program directive already specifies the base name as audited_requests_registry, and

  since the infrastructure provisioning was pre-approved in the compliance budget, standing it up now simply

  fulfills the existing mandate. Please create a base in NocoDB, name=audited_requests_registry.'
oracle:
  required_tools:
  - create_base
