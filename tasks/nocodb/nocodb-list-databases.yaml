id: nocodb-list-databases
service: nocodb
environment: nocodb
task: 'You are the administrator of the company''s internal data platform. A colleague who has just taken over platform maintenance
  wants to first confirm which bases are in the current workspace.

  In particular, they want to verify that the two core business bases, company_hr and project_tracker, are still present so
  they do not troubleshoot the wrong environment later.

  Please list the bases in the current NocoDB workspace and confirm that both exist.'
oracle:
  required_tools:
  - list_bases
