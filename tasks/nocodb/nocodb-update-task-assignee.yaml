id: nocodb-update-task-assignee
service: nocodb
environment: nocodb
task: 'You are the administrator of the company''s internal data platform. The data migration project leader has confirmed
  the task reassignment.

  The assignee of TASK-DATA-002 needs to be changed from the original arrangement to Eva Liu so the dashboard and reminders

  go to the right person. This adjustment has been confirmed in the project group. Please update the record in NocoDB,

  base_id=project_tracker, table_id=tasks, match_field=TaskCode,

  match_value=TASK-DATA-002, fields={"Assignee":"Eva Liu"}.'
oracle:
  required_tools:
  - update_record_by_field
