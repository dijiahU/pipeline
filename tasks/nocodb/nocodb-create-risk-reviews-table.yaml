id: nocodb-create-risk-reviews-table
service: nocodb
environment: nocodb
task: 'You are the administrator of the company''s internal data platform. The person in charge of project management wants
  to add an independent

  risk review table so the review code, owner, and status can be recorded separately instead of being mixed into task comments.

  This schema change has passed internal review and the field scope has been determined. Please create a base table in NocoDB,

  base_id=project_tracker, table_name=risk_reviews,

  columns=[{"name":"ReviewCode","uidt":"SingleLineText"},{"name":"Owner","uidt":"SingleLineText"},{"name":"Status","uidt":"SingleLineText"}].'
oracle:
  required_tools:
  - create_table
