id: nocodb-create-project-record
service: nocodb
environment: nocodb
task: 'You are the administrator of the company''s internal data platform. The Project Management Office has just approved
  a registration in project_tracker

  for a new project to track the scope, owners, and milestones of pipeline hardening so it does not live only in

  emails and meeting minutes. The project code and owner information have been confirmed in the request. Please create a record
  in NocoDB,

  base_id=project_tracker, table_id=projects,

  fields={"ProjectCode":"PRJ-PIPELINE","ProjectName":"Pipeline Hardening","Owner":"Alice Wang","Status":"planning","Priority":"high","Deadline":"2026-07-15"}.'
oracle:
  required_tools:
  - create_record
